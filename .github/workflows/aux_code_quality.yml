name: Python Branch Quality Validation
run-name: 🐍 Python Branch Quality Validation

on:
  workflow_call:
    inputs:
      module:
        description: 'Module on which to run code quality validation'
        required: true
        type: string

jobs:
  lint:
    name: 🧹 Lint with Ruff
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.module }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python for Poetry
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
    
      - name: Install and configure Poetry
        uses: snok/install-poetry@v1
          
      - name: Set up Python for Execution
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'
    
      - name: Install Dependencies
        run: |
          poetry env use 3.8.10
          poetry install

      - name: Run Ruff
        run: poetry run ruff check .

  type-check:
    name: 🔍 Type Check with MyPy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.module }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python for Poetry
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
    
      - name: Install and configure Poetry
        uses: snok/install-poetry@v1
          
      - name: Set up Python for Execution
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'
      
      - name: Install Dependencies
        run: |
          poetry env use 3.8.10
          poetry install

      - name: Run MyPy
        run: poetry run mypy .

  test:
    name: 🧪 Test Suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.module }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python for Poetry
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
    
      - name: Install and configure Poetry
        uses: snok/install-poetry@v1
          
      - name: Set up Python for Execution
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'
      
      - name: Install Dependencies
        run: |
          poetry env use 3.8.10
          poetry install

      - name: Run Tests
        run: poetry run pytest
